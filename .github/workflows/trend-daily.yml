name: Trend Daily Push

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

permissions:
  contents: read

jobs:
  trend-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Collect trends and push to Feishu
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
        run: |
          cat > /tmp/trend_push.py <<'PY'
          import json, os, time, urllib.parse, urllib.request
          from datetime import datetime, timezone

          APIFY = os.environ["APIFY_TOKEN"]
          DEEPSEEK = os.environ["DEEPSEEK_API_KEY"]
          WEBHOOK = os.environ["HORIZON_WEBHOOK_URL"]
          items = []
          seed_items = []

          def request(url, data=None, headers=None, timeout=60):
              body = None if data is None else json.dumps(data).encode("utf-8")
              req = urllib.request.Request(url, data=body, headers=headers or {})
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def apify(actor, payload):
              url = f"https://api.apify.com/v2/acts/{actor}/runs?token={urllib.parse.quote(APIFY)}"
              run = request(url, payload, {"Content-Type":"application/json"})["data"]
              run_id, dataset_id = run["id"], run["defaultDatasetId"]
              for _ in range(80):
                  state = request(f"https://api.apify.com/v2/actor-runs/{run_id}?token={urllib.parse.quote(APIFY)}")["data"]["status"]
                  if state == "SUCCEEDED":
                      return request(f"https://api.apify.com/v2/datasets/{dataset_id}/items?token={urllib.parse.quote(APIFY)}&clean=true")
                  if state in {"FAILED","ABORTED","TIMED-OUT"}:
                      print(f"Actor {actor} ended: {state}")
                      return []
                  time.sleep(3)
              print(f"Actor {actor} timeout")
              return []

          # Stage 1: read seed profiles/posts only to learn taste; never push them directly.
          seed_handles = ["Leobai825","qihang_zeng6688","gengdaJ","CycleDecoded","SjwEsther","expertwith_AI","Etudecn"]
          seed_urls = [
              "https://x.com/Leobai825/status/2077314850116542838",
              "https://x.com/gengdaJ/status/2077014826552037655",
              "https://x.com/expertwith_AI/status/2077221134051995773",
              "https://x.com/Etudecn/status/2077185361407836415"
          ]
          try:
              x_seed_rows = apify("scrapesage~twitter-scraper", {
                  "handles":seed_handles, "tweetUrls":seed_urls,
                  "includeProfile":False, "includeTweets":True, "includeReplies":False,
                  "maxTweetsPerProfile":8, "onlyTweetsNewerThan":"30 days",
                  "monitorMode":False
              })
              for r in x_seed_rows:
                  if r.get("type") and r.get("type") != "tweet":
                      continue
                  text = r.get("text") or r.get("fullText") or ""
                  if text:
                      seed_items.append({
                          "platform":"X", "author":r.get("authorHandle") or "",
                          "text":str(text)[:1200], "url":r.get("url") or "",
                          "mentions":r.get("mentions") or [],
                          "quoted":r.get("quotedTweet") or {}
                      })
              print("X seed rows learned:", len(seed_items))
          except Exception as e:
              print("X seed learning failed:", e)

          # Build a discovery profile from seeds. Seeds describe taste, not final recommendations.
          fallback_discovery = {
              "x_query":"(AI agent OR LLM OR 大模型 OR 人工智能 OR 中医养生 OR 食疗 OR 玄学 OR 命理 OR 八字 OR 紫微斗数) -filter:replies",
              "pinterest_queries":["AI tools workflow","Chinese food therapy wellness","astrology metaphysics"],
              "reddit_queries":["AI agent LLM","traditional Chinese medicine wellness","astrology metaphysics"],
              "themes":["AI技术","中医养生","玄学命理"]
          }
          discovery = fallback_discovery
          if seed_items:
              try:
                  profile_prompt = """分析以下用户主动提供的种子内容。种子只用于学习偏好，不是推荐结果。请提取：1）适合在X搜索的新资讯查询式；2）Pinterest相似内容搜索词3个；3）Reddit搜索词3个；4）细分主题。搜索目标是发现种子作者之外、刚出现或正在升温的行业资讯。只输出JSON，结构为 {\"x_query\":\"...\",\"pinterest_queries\":[...],\"reddit_queries\":[...],\"themes\":[...]}。\n种子：\n""" + json.dumps(seed_items[:50], ensure_ascii=False)
                  profile_payload = {"model":"deepseek-v4-flash","messages":[{"role":"user","content":profile_prompt}],"temperature":0.1,"max_tokens":1600}
                  profile_resp = request("https://api.deepseek.com/chat/completions", profile_payload, {"Content-Type":"application/json","Authorization":f"Bearer {DEEPSEEK}"}, timeout=120)
                  raw_profile = profile_resp["choices"][0]["message"]["content"].strip().replace("```json","").replace("```","").strip()
                  parsed_profile = json.loads(raw_profile)
                  if parsed_profile.get("x_query"):
                      discovery = parsed_profile
              except Exception as e:
                  print("Seed profile generation failed, using fallback:", e)
          print("Discovery profile:", json.dumps(discovery, ensure_ascii=False))

          # Stage 2: discover NEW X posts from the learned query; exclude seed URLs/authors.
          try:
              x_rows = apify("maximedupre~twitter-scraper", {
                  "target":"searchPosts", "searchQuery":discovery["x_query"],
                  "searchMode":"latestAndTop", "maxNbItemsToScrape":60
              })
              blocked_authors = {h.lower() for h in seed_handles}
              blocked_urls = {u.rstrip("/") for u in seed_urls}
              for r in x_rows:
                  text = r.get("fullText") or r.get("full_text") or r.get("text") or r.get("content") or ""
                  handle = r.get("authorHandle") or r.get("username") or r.get("authorUsername") or (r.get("author") or {}).get("username") or "unknown"
                  tid = str(r.get("id") or r.get("tweetId") or r.get("postId") or "")
                  url = r.get("url") or r.get("tweetUrl") or r.get("postUrl") or (f"https://x.com/{handle}/status/{tid}" if tid else None)
                  if not text or not url or url.rstrip("/") in blocked_urls or handle.lower() in blocked_authors:
                      continue
                  quoted = r.get("quotedTweet") or r.get("quoted_tweet") or {}
                  mentions = r.get("mentions") or r.get("userMentions") or []
                  context = str(text)
                  if quoted: context += "\nQuoted: " + str(quoted)[:700]
                  if mentions: context += "\nMentions: " + str(mentions)[:300]
                  items.append({"source":"X", "title":str(text)[:140], "text":context[:1200],
                      "url":url, "author":handle,
                      "likes":int(r.get("favoriteCount") or r.get("likeCount") or r.get("favorite_count") or 0),
                      "shares":int(r.get("retweetCount") or r.get("retweet_count") or 0),
                      "comments":int(r.get("replyCount") or r.get("reply_count") or 0)})
              print("X new discovery rows:", len([i for i in items if i["source"] == "X"]))
          except Exception as e:
              print("X discovery failed:", e)
          # Pinterest: user-provided board/pins plus closely related discovery searches.
          try:
              p_rows = apify("thirdwatch~pinterest-scraper", {
                  "searchQueries":discovery.get("pinterest_queries", fallback_discovery["pinterest_queries"]),
                  "maxResults":60
              })
              for r in p_rows:
                  title = r.get("title") or r.get("description") or r.get("name") or ""
                  url = r.get("url") or r.get("pinUrl") or r.get("link")
                  board = r.get("boardName") or r.get("board") or ""
                  author = r.get("username") or r.get("pinnerUsername") or r.get("author") or ""
                  context = str(r.get("description") or r.get("altText") or "")
                  if board:
                      context += "\nBoard: " + str(board)
                  if title and url:
                      items.append({"source":"Pinterest", "title":str(title)[:160],
                          "text":context[:800], "url":url, "author":str(author),
                          "likes":int(r.get("saveCount") or r.get("repinCount") or r.get("saves") or 0),
                          "shares":0, "comments":int(r.get("commentCount") or 0)})
          except Exception as e:
              print("Pinterest collection failed:", e)
          # Reddit: residential-proxy actor avoids GitHub Actions 403 blocks.
          try:
              reddit_rows = apify("betterdevsscrape~reddit-scraper", {
                  "searches":discovery.get("reddit_queries", fallback_discovery["reddit_queries"]),
                  "searchPosts":True, "searchComments":False,
                  "sort":"rising", "time":"day",
                  "maxItems":30, "maxPostCount":10,
                  "maxComments":0, "skipComments":True,
                  "includeNSFW":False,
                  "proxy":{"useApifyProxy":True,"apifyProxyGroups":["RESIDENTIAL"]}
              })
              for r in reddit_rows:
                  title = r.get("title") or r.get("postTitle") or ""
                  url = r.get("url") or r.get("permalink") or r.get("postUrl")
                  if url and str(url).startswith("/"):
                      url = "https://www.reddit.com" + str(url)
                  if title and url:
                      items.append({"source":"Reddit", "title":str(title)[:180],
                          "text":str(r.get("selfText") or r.get("selftext") or r.get("body") or "")[:600],
                          "url":url,
                          "likes":int(r.get("score") or r.get("upvotes") or 0), "shares":0,
                          "comments":int(r.get("numComments") or r.get("num_comments") or 0)})
          except Exception as e:
              print("Reddit collection failed:", e)
          if not items:
              raise RuntimeError("No trend items collected from any source")

          # Balance themes before LLM filtering so Pinterest saves cannot crowd out X/Reddit.
          ai_words = ["ai", "llm", "agent", "model", "openai", "claude", "gemini", "deepseek", "人工智能", "大模型", "智能体", "模型", "提示词"]
          tcm_words = ["中医", "养生", "气血", "经络", "食疗", "汤", "茶", "tcm", "chinese medicine", "wellness", "herbal", "nourish"]
          meta_words = ["玄学", "命理", "八字", "紫微", "风水", "占星", "星盘", "astrology", "metaphysics", "fortune", "zodiac"]

          def topic_of(item):
              text = (str(item.get("title", "")) + " " + str(item.get("text", ""))).lower()
              scores = {
                  "AI技术": sum(1 for w in ai_words if w in text),
                  "中医养生": sum(1 for w in tcm_words if w in text),
                  "玄学命理": sum(1 for w in meta_words if w in text),
              }
              topic = max(scores, key=scores.get)
              return topic if scores[topic] > 0 else "待识别"

          buckets = {"AI技术": [], "中医养生": [], "玄学命理": [], "待识别": []}
          source_counts = {}
          for i in items:
              i["signal"] = i["likes"] + i["shares"] * 2 + i["comments"] * 1.5
              i["pre_category"] = topic_of(i)
              buckets[i["pre_category"]].append(i)
              source_counts[i["source"]] = source_counts.get(i["source"], 0) + 1
          for values in buckets.values():
              values.sort(key=lambda x: x["signal"], reverse=True)
          candidates = buckets["AI技术"][:25] + buckets["中医养生"][:25] + buckets["玄学命理"][:25] + buckets["待识别"][:10]
          print("Collected by source:", source_counts)
          print("Candidates by topic:", {k: len(v) for k, v in buckets.items()})

          prompt = """你是用户的个性化跨平台趋势雷达。种子内容只用于偏好建模，严禁把种子链接或种子作者的原帖作为推荐结果。推荐必须是从种子偏好扩展发现的新作者、新帖子或新趋势。X 和 Pinterest 候选内容来自用户主动提供的种子博主、帖子、画板与 Pin，请优先学习这些种子的主题、表达角度和审美偏好，再发现其中被转发、引用、提及的关联作者与相似内容。Reddit 用于补充正在升温的讨论。重点关注 AI 技术、中医养生、玄学命理，以及与种子内容明显相似的新趋势。排除泛新闻、广告、重复内容和只有高互动但与种子偏好无关的内容。输出中文 Markdown：先写3条个性化趋势判断，再按主题分组；每条包含标题、平台、作者、为什么与种子偏好相关、趋势信号、原链接。三个主题必须分别输出，目标配额为 AI技术4条、中医养生4条、玄学命理4条。只能在某一主题确实没有合格候选时少于4条，并明确写出该主题候选不足，禁止用其他主题补位。总计最多12条，不得编造候选数据之外的信息。\n\n候选数据：\n""" + "\n偏好画像：\n" + json.dumps(discovery, ensure_ascii=False) + "\n候选数据：\n" + json.dumps(candidates, ensure_ascii=False)
          ai_payload = {
              "model":"deepseek-v4-flash",
              "messages":[{"role":"user","content":prompt}],
              "temperature":0.2,
              "max_tokens":5000
          }
          ai = request("https://api.deepseek.com/chat/completions", ai_payload, {
              "Content-Type":"application/json", "Authorization":f"Bearer {DEEPSEEK}"}, timeout=120)
          summary = ai["choices"][0]["message"]["content"]
          today = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          card = {
              "msg_type":"interactive",
              "card":{
                  "schema":"2.0",
                  "config":{"wide_screen_mode":True},
                  "header":{"title":{"tag":"plain_text","content":f"跨平台趋势雷达 · {today}"},"template":"blue"},
                  "body":{"elements":[{"tag":"markdown","content":summary}]}
              }
          }
          result = request(WEBHOOK, card, {"Content-Type":"application/json"})
          print("Push result:", json.dumps(result, ensure_ascii=False))
          PY
          python /tmp/trend_push.py






